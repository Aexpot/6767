<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xOVPN Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .header h1 {
            font-size: 24px;
            color: #8D4BFF;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .tab {
            padding: 10px 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .tab.active {
            background: #8D4BFF;
            border-color: #8D4BFF;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #8D4BFF;
        }

        .table {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
        }

        .table-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            padding: 15px;
            background: #0a0a0a;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        .table-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            padding: 15px;
            border-bottom: 1px solid #333;
            align-items: center;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .btn {
            padding: 8px 16px;
            background: #8D4BFF;
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #7a3ee6;
        }

        .btn-danger {
            background: #ff4444;
        }

        .btn-danger:hover {
            background: #cc0000;
        }

        .btn-success {
            background: #00cc44;
        }

        .btn-success:hover {
            background: #009933;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-success {
            background: #00cc44;
            color: #000;
        }

        .badge-danger {
            background: #ff4444;
            color: #fff;
        }

        .badge-warning {
            background: #ffaa00;
            color: #000;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ xOVPN Admin</h1>
            <div id="admin-info"></div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('stats')">📊 Статистика</div>
            <div class="tab" onclick="switchTab('users')">👥 Пользователи</div>
            <div class="tab" onclick="switchTab('payments')">💳 Платежи</div>
            <div class="tab" onclick="switchTab('logs')">📝 Логи</div>
        </div>

        <div id="stats-tab" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Всего пользователей</h3>
                    <div class="value" id="total-users">-</div>
                </div>
                <div class="stat-card">
                    <h3>Активных подписок</h3>
                    <div class="value" id="active-subs">-</div>
                </div>
                <div class="stat-card">
                    <h3>Доход за месяц</h3>
                    <div class="value" id="monthly-revenue">-</div>
                </div>
                <div class="stat-card">
                    <h3>Новых сегодня</h3>
                    <div class="value" id="today-users">-</div>
                </div>
            </div>
        </div>

        <div id="users-tab" class="tab-content hidden">
            <input type="text" class="search-box" placeholder="🔍 Поиск по имени или username..." id="user-search">
            <div class="table">
                <div class="table-header">
                    <div>Пользователь</div>
                    <div>Подписка</div>
                    <div>Статус</div>
                    <div>Действия</div>
                </div>
                <div id="users-list"></div>
            </div>
        </div>

        <div id="payments-tab" class="tab-content hidden">
            <div class="table">
                <div class="table-header">
                    <div>Пользователь</div>
                    <div>Сумма</div>
                    <div>Статус</div>
                    <div>Дата</div>
                </div>
                <div id="payments-list"></div>
            </div>
        </div>

        <div id="logs-tab" class="tab-content hidden">
            <div class="table">
                <div class="table-header">
                    <div>Админ</div>
                    <div>Действие</div>
                    <div>Детали</div>
                    <div>Дата</div>
                </div>
                <div id="logs-list"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const API_URL = 'https://web.x0vpn.xyz/api';
        let telegramId = null;

        // Initialize
        if (tg.initDataUnsafe?.user) {
            telegramId = tg.initDataUnsafe.user.id;
            document.getElementById('admin-info').textContent = `👤 ${tg.initDataUnsafe.user.first_name}`;
            loadData();
        } else {
            document.body.innerHTML = '<div class="loading">❌ Ошибка: откройте через Telegram</div>';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));

            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.remove('hidden');

            if (tab === 'users') loadUsers();
            if (tab === 'payments') loadPayments();
            if (tab === 'logs') loadLogs();
        }

        async function loadData() {
            await loadStats();
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}/admin/stats?telegram_id=${telegramId}`);
                const data = await res.json();

                document.getElementById('total-users').textContent = data.total_users || 0;
                document.getElementById('active-subs').textContent = data.active_subscriptions || 0;
                document.getElementById('monthly-revenue').textContent = (data.monthly_revenue || 0).toLocaleString('ru-RU') + ' ₽';
                document.getElementById('today-users').textContent = '+' + (data.today_users || 0);
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadUsers() {
            const list = document.getElementById('users-list');
            list.innerHTML = '<div class="loading">Загрузка...</div>';

            try {
                const res = await fetch(`${API_URL}/admin/users?telegram_id=${telegramId}&limit=50`);
                const data = await res.json();

                list.innerHTML = data.users.map(u => `
                    <div class="table-row">
                        <div>
                            <strong>${u.first_name || 'Без имени'}</strong>
                            ${u.username ? '@' + u.username : ''}
                        </div>
                        <div>${u.subscriptions?.[0]?.subscription_plans?.name || 'Нет'}</div>
                        <div>
                            ${u.is_banned ? '<span class="badge badge-danger">Бан</span>' :
                              u.subscriptions?.[0]?.status === 'active' ? '<span class="badge badge-success">Активна</span>' :
                              u.subscriptions?.[0]?.status === 'trial' ? '<span class="badge badge-warning">Триал</span>' :
                              '<span class="badge">Нет</span>'}
                        </div>
                        <div class="actions">
                            <button class="btn btn-success" onclick="grantSub('${u.id}')">+</button>
                            <button class="btn ${u.is_banned ? 'btn-success' : 'btn-danger'}"
                                    onclick="toggleBan('${u.id}', ${!u.is_banned})">
                                ${u.is_banned ? '✓' : '🚫'}
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                list.innerHTML = '<div class="loading">Ошибка загрузки</div>';
            }
        }

        async function loadPayments() {
            const list = document.getElementById('payments-list');
            list.innerHTML = '<div class="loading">Загрузка...</div>';

            try {
                const res = await fetch(`${API_URL}/admin/payments?telegram_id=${telegramId}&limit=50`);
                const data = await res.json();

                list.innerHTML = data.payments.map(p => `
                    <div class="table-row">
                        <div>${p.users?.first_name || 'N/A'}</div>
                        <div>${p.amount_rub} ₽</div>
                        <div>
                            ${p.status === 'completed' ? '<span class="badge badge-success">Оплачен</span>' :
                              p.status === 'pending' ? '<span class="badge badge-warning">Ожидает</span>' :
                              '<span class="badge badge-danger">Отменён</span>'}
                        </div>
                        <div>${new Date(p.created_at).toLocaleDateString('ru-RU')}</div>
                    </div>
                `).join('');
            } catch (error) {
                list.innerHTML = '<div class="loading">Ошибка загрузки</div>';
            }
        }

        async function loadLogs() {
            const list = document.getElementById('logs-list');
            list.innerHTML = '<div class="loading">Загрузка...</div>';

            try {
                const res = await fetch(`${API_URL}/admin/logs?telegram_id=${telegramId}&limit=50`);
                const data = await res.json();

                list.innerHTML = data.logs.map(l => `
                    <div class="table-row">
                        <div>${l.first_name || 'Admin'}</div>
                        <div>${l.action}</div>
                        <div>${l.entity_type || '-'}</div>
                        <div>${new Date(l.created_at).toLocaleDateString('ru-RU')}</div>
                    </div>
                `).join('');
            } catch (error) {
                list.innerHTML = '<div class="loading">Ошибка загрузки</div>';
            }
        }

        async function toggleBan(userId, ban) {
            if (!confirm(ban ? 'Забанить пользователя?' : 'Разбанить пользователя?')) return;

            try {
                await fetch(`${API_URL}/admin/users?telegram_id=${telegramId}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId, is_banned: ban})
                });
                loadUsers();
            } catch (error) {
                alert('Ошибка');
            }
        }

        async function grantSub(userId) {
            const months = prompt('Сколько месяцев подписки выдать?', '1');
            if (!months) return;

            try {
                await fetch(`${API_URL}/admin/subscriptions?telegram_id=${telegramId}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        plan_id: '1',
                        status: 'active',
                        devices_count: 5,
                        duration_months: parseInt(months)
                    })
                });
                alert('Подписка выдана!');
                loadUsers();
            } catch (error) {
                alert('Ошибка');
            }
        }

        // Search
        document.getElementById('user-search')?.addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            document.querySelectorAll('#users-list .table-row').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(search) ? 'grid' : 'none';
            });
        });
    </script>
</body>
</html>
